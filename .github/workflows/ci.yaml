name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - Dockerfile
  pull_request:
    branches: [ main ]

env:
  WASM_TARGET: wasm32-unknown-unknown
  CARGO_TERM_COLOR: always

jobs:
  # rustfmt and clippy
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --exclude keyhook-ui --all-targets -- -D warnings

  # build and test backend / model
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - uses: Swatinem/rust-cache@v2

      - name: install system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config curl \
            libssl-dev \
            libglib2.0-dev libgobject-2.0-dev libgio2.0-dev \
            libgdk-3-dev libgtk-3-dev \
            libgdk-pixbuf-2.0-dev libpango1.0-dev libcairo2-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            squashfs-tools patchelf

      - name: run tests
        run: cargo test --workspace --exclude keyhook-ui --locked

  # compile keyhook-ui for wasm32
  wasm-build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: ${{ env.WASM_TARGET }}

      - uses: Swatinem/rust-cache@v2

      - name: build keyhook-ui (wasm32)
        run: cargo build -p keyhook-ui --target ${{ env.WASM_TARGET }} --release --locked

  # build static assets with trunk
  trunk-build:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: ${{ env.WASM_TARGET }}

      - name: install trunk
        run: cargo install trunk wasm-bindgen-cli --locked

      - name: trunk build (release)
        run: trunk build --release
