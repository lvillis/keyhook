name: release

# Triggered by a pushed tag or the manual button
on:
  push:
    tags: ['*']

  workflow_dispatch:
    inputs:
      build_ref:
        description: 'Commit / Tag / Branch to build (leave empty = current HEAD)'
        required: false

env:
  PROJECT: keyhook
  RUST_VERSION: stable
  WASM_TARGET: wasm32-unknown-unknown

jobs:
  build:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            bundles: 'nsis wix-msi'
            artifact_glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/wix/*.msi

          # macOS
          - os: macos-latest
            bundles: 'dmg'
            artifact_glob: target/release/bundle/dmg/*.dmg

          # Linux
          - os: ubuntu-latest
            bundles: 'appimage deb'
            artifact_glob: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb

    steps:
      # 1. Check out the desired ref
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.build_ref || github.ref }}

      # 2. Figure out which version we are building
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.build_ref }}" ]]; then
            echo "VERSION=${{ github.event.inputs.build_ref }}" >> "$GITHUB_OUTPUT"
          else
            ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          fi
          echo "Building version: ${{ steps.version.outputs.VERSION }}"

      # 3. Install Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          target: ${{ env.WASM_TARGET }}

      - uses: Swatinem/rust-cache@v2

      # 4. Extra libraries on Linux
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config curl libssl-dev \
            libglib2.0-dev libgirepository1.0-dev libgtk-3-dev \
            libatk1.0-dev libatk-bridge2.0-dev libgdk-pixbuf-2.0-dev \
            libpango1.0-dev libcairo2-dev libayatana-appindicator3-dev \
            squashfs-tools patchelf \
            libwebkit2gtk-4.0-dev || sudo apt-get install -y libwebkit2gtk-4.1-dev

      # 5. Windows bundlers
      - name: Install Windows bundlers
        if: runner.os == 'Windows'
        run: choco install -y nsis wix --no-progress

      # 6. Node and CLI tools
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install trunk / wasm-bindgen / tauri-cli
        run: cargo install trunk wasm-bindgen-cli tauri-cli --locked

      # 7. Build the Yew front-end
      - name: Build UI (trunk)
        run: |
          pushd crates/keyhook-ui
          trunk build --release
          popd

      # 8. Build and bundle the Tauri app
      - name: Build and bundle
        run: cargo tauri build --bundles "${{ matrix.bundles }}"

      # 9. Upload build artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: keyhook-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # 10. Generate release notes
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ steps.version.outputs.VERSION }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      # 11. Create a GitHub release (only when a tag was pushed)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: KeyHook ${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
