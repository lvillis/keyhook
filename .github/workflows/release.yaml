name: release

on:
  # Automatic run when a Git tag is pushed
  push:
    tags: ['*']

  # Manual run via the “Run workflow” button
  workflow_dispatch:
    inputs:
      build_ref:
        description: 'Commit / Tag / Branch to build (leave empty = current HEAD)'
        required: false

# Needed so the workflow can create a GitHub Release
permissions:
  contents: write

env:
  PROJECT: keyhook
  RUST_VERSION: stable
  WASM_TARGET: wasm32-unknown-unknown

jobs:
  build:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows build
          - os: windows-latest
            bundles: 'nsis,msi'
            artifact_glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi

          # macOS build
          - os: macos-latest
            bundles: 'dmg'
            artifact_glob: target/release/bundle/dmg/*.dmg

    steps:
      # 1. Check out the desired ref
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.build_ref || github.ref }}

      # 2. Determine the version string
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.build_ref }}" ]]; then
            echo "VERSION=${{ github.event.inputs.build_ref }}" >> "$GITHUB_OUTPUT"
          else
            ver=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            echo "VERSION=$ver" >> "$GITHUB_OUTPUT"
          fi
          echo "Building version: ${{ steps.version.outputs.VERSION }}"

      # 3. Install Rust toolchain
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          target: ${{ env.WASM_TARGET }}

      - uses: Swatinem/rust-cache@v2

      # 4. Install Windows-only bundlers (WiX + NSIS)
      - name: Install Windows bundlers
        if: runner.os == 'Windows'
        run: choco install -y nsis wixtoolset --no-progress

      # 5. Install Node and CLI tools (Trunk, wasm-bindgen, Tauri)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust CLI helpers
        run: cargo install trunk wasm-bindgen-cli tauri-cli --locked

      # 6. Build the Yew front-end (Trunk)
      - name: Build UI (Trunk)
        run: |
          pushd crates/keyhook-ui
          trunk build --release
          popd

      # 7. Build and bundle the Tauri application
      - name: Build and bundle
        run: cargo tauri build --bundles "${{ matrix.bundles }}"

      # 8. Upload generated artefacts
      - uses: actions/upload-artifact@v4
        with:
          name: keyhook-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # 9. Generate release notes (git-cliff)
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ steps.version.outputs.VERSION }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      # 10. Publish a GitHub Release (only on tag builds)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: KeyHook ${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
