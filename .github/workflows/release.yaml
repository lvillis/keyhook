name: release

on:
  push:
    tags:
      - '*'

env:
  PROJECT: keyhook
  RUST_VERSION: stable            # same on every runner
  WASM_TARGET: wasm32-unknown-unknown

jobs:
  build:
    strategy:
      matrix:
        include:
          # ---------- Windows ----------
          - os: windows-latest
            bundles: "nsis wix-msi"
            artifact_glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/wix/*.msi

          # ---------- macOS ----------
          - os: macos-latest
            bundles: "dmg"
            artifact_glob: target/release/bundle/dmg/*.dmg

          # ---------- Linux ----------
          - os: ubuntu-latest
            bundles: "appimage deb"
            artifact_glob: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb

    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------- version -------------
      - name: Extract tag version
        id: tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      # ------- tool-chains ----------
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          target: ${{ env.WASM_TARGET }}

      - uses: Swatinem/rust-cache@v2

      # ------- OS dependencies -----
      - name: Install Linux libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config curl \
            libssl-dev \
            libglib2.0-dev libgirepository1.0-dev \
            libgtk-3-dev \
            libatk1.0-dev libatk-bridge2.0-dev \
            libgdk-pixbuf-2.0-dev libpango1.0-dev libcairo2-dev \
            libayatana-appindicator3-dev \
            squashfs-tools patchelf \
            libwebkit2gtk-4.0-dev || \
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      # WiX & NSIS only on Windows
      - name: Install Windows bundlers
        if: runner.os == 'Windows'
        run: choco install -y nsis wix

      # ------- Node / Trunk / Tauri CLI ----------
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI tools (trunk, wasm-bindgen, tauri)
        run: cargo install trunk wasm-bindgen-cli tauri-cli --locked

      # ------- Build front-end (Trunk) -------------
      - name: Build Yew front-end (wasm, trunk)
        run: |
          pushd crates/keyhook-ui
          trunk build --release
          popd

      # ------- Build & bundle with Tauri -----------
      - name: Build + bundle (Tauri)
        run: cargo tauri build --bundles "${{ matrix.bundles }}"

      # ------- Upload artifacts -------------------
      - uses: actions/upload-artifact@v4
        with:
          name: keyhook-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      # ------- Generate changelog -----------------
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ steps.tag.outputs.VERSION }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      # ------- GitHub release ---------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: KeyHook ${{ steps.tag.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
