name: release

on:
  push:
    tags:
      - '*'

env:
  PROJECT: keyhook
  RUST_VERSION: stable
  WASM_TARGET: wasm32-unknown-unknown

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            bundles: "nsis wix-msi"
            artifact_glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/wix/*.msi

          - os: macos-latest
            bundles: "dmg"
            artifact_glob: target/release/bundle/dmg/*.dmg

          - os: ubuntu-latest
            bundles: "appimage deb"
            artifact_glob: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb

    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          target: ${{ env.WASM_TARGET }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            squashfs-tools \
            libayatana-appindicator3-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI tools
        run: cargo install trunk wasm-bindgen-cli tauri-cli --locked

      - name: Install Windows bundlers
        if: runner.os == 'Windows'
        run: choco install nsis wix --no-progress -y

      - name: Build & bundle
        run: |
          cargo tauri build \
            --bundles "${{ matrix.bundles }}"

      - uses: actions/upload-artifact@v4
        with:
          name: keyhook-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --tag ${{ steps.tag.outputs.VERSION }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: KeyHook ${{ steps.tag.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          files: ${{ matrix.artifact_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
